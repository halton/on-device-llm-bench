<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>On-Device LLM Eval Harness</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 1100px; margin: 1rem auto; padding: 0 1rem; }
    fieldset { margin-bottom: 1rem; }
    label { display: inline-block; margin-right: 1rem; }
    button { padding: 0.5rem 1rem; margin-right: 0.5rem; }
    #log { white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: 12px;
           background: #111; color: #eee; padding: 0.75rem; height: 360px; overflow-y: auto; border-radius: 6px; }
    .stat { display: inline-block; margin-right: 1.5rem; font-variant-numeric: tabular-nums; }
    table { border-collapse: collapse; margin-top: 0.5rem; font-size: 13px; }
    th, td { border: 1px solid #ccc; padding: 4px 8px; text-align: right; }
    th:first-child, td:first-child { text-align: left; }
  </style>
</head>
<body>
  <h1>On-Device LLM Eval Harness</h1>
  <p>Compare Gemma 4 (Transformers.js) vs Phi-4-mini (Edge Prompt API) on the same case suite.</p>

  <fieldset>
    <legend>Backend</legend>
    <label><input type="radio" name="backend" value="gemma-tjs" checked /> Gemma 4 / Transformers.js / WebGPU</label>
    <label><input type="radio" name="backend" value="edge-prompt" /> Phi-4-mini / Edge Prompt API</label>
  </fieldset>

  <fieldset>
    <legend>Run config</legend>
    <label>Runs per case: <input id="runsPerCase" type="number" min="1" max="20" value="3" style="width:4rem" /></label>
    <label>Categories:
      <label><input type="checkbox" class="cat" value="tool-calling" checked /> tool-calling</label>
      <label><input type="checkbox" class="cat" value="grounding" checked /> grounding</label>
      <label><input type="checkbox" class="cat" value="refusal" checked /> refusal</label>
      <label><input type="checkbox" class="cat" value="multi-turn" checked /> multi-turn</label>
    </label>
  </fieldset>

  <button id="loadBtn">1. Load model</button>
  <button id="runBtn" disabled>2. Run eval</button>
  <button id="downloadBtn" disabled>3. Download results JSON</button>
  <button id="stopBtn" disabled>Stop</button>

  <div style="margin-top:0.75rem">
    <span class="stat">Status: <b id="status">idle</b></span>
    <span class="stat">Cases: <b id="caseCount">0</b></span>
    <span class="stat">Progress: <b id="progress">0/0</b></span>
    <span class="stat">Pass: <b id="passCount">0</b></span>
    <span class="stat">Fail: <b id="failCount">0</b></span>
  </div>

  <h3>Live log</h3>
  <div id="log"></div>

  <h3>Aggregated metrics (current backend)</h3>
  <div id="agg"></div>

  <script type="module" src="./runner.ts"></script>
</body>
</html>
